<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Drop shadow for the central text to give it a 3D effect -->
    <filter id="shadow-main" x="-10%" y="-10%" width="120%" height="120%">
      <dropShadow dx="0" dy="6" stdDeviation="5" flood-color="#0284c7" flood-opacity="0.35"/>
    </filter>
    <filter id="glow-light" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="50%" stop-color="#00B8D4" />
      <stop offset="100%" stop-color="#26C6DA" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#CFD8DC" />
    </linearGradient>
  </defs>

  <!-- Base white circle background -->
  <circle cx="256" cy="256" r="250" fill="#FFFFFF" />
  
  <!-- Outer subtle sleek boundary ring -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#E2E8F0" stroke-width="2" />

  <!-- Cyan Swirl/Orbits Structure to recreate the exact background look -->
  <g opacity="0.95">
    <!-- Back loop -->
    <path d="M 120,220 C 130,120 380,120 400,210 C 420,300 230,420 140,360 C 80,320 110,280 120,220 Z" fill="none" stroke="url(#orbitGrad)" stroke-width="48" stroke-linecap="round" />
    
    <!-- Front overlapping loop -->
    <path d="M 390,290 C 380,390 130,390 110,300 C 90,210 280,90 370,150 C 430,190 400,230 390,290 Z" fill="none" stroke="#26C6DA" stroke-width="32" stroke-linecap="round" opacity="0.85" />
    
    <!-- Accent loop to refine details -->
    <ellipse cx="256" cy="256" rx="210" ry="145" fill="none" stroke="#1DE9B6" stroke-width="12" transform="rotate(-15 256 256)" opacity="0.6" stroke-dasharray="250 120" />
  </g>

  <!-- Central high-contrast white dome (the ellipse space) -->
  <ellipse cx="256" cy="256" rx="160" ry="95" fill="#FFFFFF" stroke="#E0F7FA" stroke-width="6" transform="rotate(-10 256 256)" />

  <!-- Reference paths for the curved text to flow gracefully -->
  <!-- Top text path curving up -->
  <path id="pathTop" d="M 90,220 A 175,145 0 0,1 422,220" fill="none" />
  <!-- Bottom text path curving down -->
  <path id="pathBottom" d="M 100,295 A 172,142 0 0,0 412,295" fill="none" />

  <!-- Curved Texts in bold sans-serif -->
  <!-- 1. SMPN 2 Lamongan (Top) -->
  <text font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-weight="900" font-size="28" letter-spacing="1.5">
    <textPath href="#pathTop" startOffset="50%" text-anchor="middle" fill="#FFFFFF" stroke="#00B8D4" stroke-width="6" stroke-linejoin="round" paint-order="stroke fill">SMPN 2 Lamongan</textPath>
    <textPath href="#pathTop" startOffset="50%" text-anchor="middle" fill="#FFFFFF">SMPN 2 Lamongan</textPath>
  </text>

  <!-- 2. CLASS OF SEVEN D (Bottom) -->
  <text font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-weight="900" font-size="25" letter-spacing="2">
    <textPath href="#pathBottom" startOffset="50%" text-anchor="middle" fill="#FFFFFF" stroke="#00B8D4" stroke-width="6" stroke-linejoin="round" paint-order="stroke fill">CLASS OF SEVEN D</textPath>
    <textPath href="#pathBottom" startOffset="50%" text-anchor="middle" fill="#FFFFFF">CLASS OF SEVEN D</textPath>
  </text>

  <!-- Stars Accent (Orange/Gold Star Elements from the uploaded image) -->
  <!-- Star left -->
  <g transform="translate(135, 275) rotate(-15)">
    <polygon points="0,-16 5,-5 16,-4 8,4 10,15 0,10 -10,15 -8,4 -16,-4 -5,-5" fill="#FFB300" stroke="#FFFFFF" stroke-width="3" filter="url(#glow-light)" />
  </g>
  <!-- Star right -->
  <g transform="translate(385, 215) rotate(15)">
    <polygon points="0,-16 5,-5 16,-4 8,4 10,15 0,10 -10,15 -8,4 -16,-4 -5,-5" fill="#FFB300" stroke="#FFFFFF" stroke-width="3" filter="url(#glow-light)" />
  </g>

  <!-- Centerpiece bold 3D Text: VII D -->
  <text x="256" y="284" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', 'Montserrat', sans-serif" font-weight="950" font-size="105" letter-spacing="-3" text-anchor="middle" fill="url(#textGrad)" filter="url(#shadow-main)" transform="rotate(-10 256 256)">VII D</text>
</svg>
